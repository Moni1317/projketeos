<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Filmový Rádce</title>
    <link rel="stylesheet" href="https://jsdelivr.net">
    <style>
        body { padding: 2rem; }
        #result { margin-top: 2rem; padding: 1rem; border-radius: 8px; display: none; }
        .loading { display: none; }
        .history-section { margin-top: 3rem; border-top: 1px solid #444; padding-top: 1rem; }
        .history-item { font-size: 0.9rem; margin-bottom: 0.5rem; border-bottom: 1px dashed #333; padding-bottom: 0.5rem; }
    </style>
</head>
<body>
    <main class="container">
        <header>
            <h1>🎬 AI Filmový Rádce</h1>
            <p>Zadej žánr a nechej si poradit od lokální AI (Gemma3:27b).</p>
        </header>

        <section>
            <form id="movieForm">
                <label for="genre">Žánr filmu</label>
                <input type="text" id="genre" name="genre" placeholder="např. Sci-fi, Komedie, Horor..." required>
                <button type="submit" id="submitBtn">Najdi mi film</button>
            </form>
        </section>

        <progress class="loading" id="loader"></progress>

        <article id="result">
            <header><strong>Návrh pro tebe:</strong></header>
            <p id="recommendationText"></p>
        </article>

        <section class="history-section">
            <h3>📜 Historie doporučení</h3>
            <div id="historyList">
                <p>Zatím žádná historie...</p>
            </div>
        </section>

        <footer style="margin-top: 3rem; font-size: 0.8rem;">
            <p>Endpointy: <a href="/status">/status</a> | <a href="/history">/history</a></p>
        </footer>
    </main>

    <script>
        const form = document.getElementById('movieForm');
        const resultDiv = document.getElementById('result');
        const resultText = document.getElementById('recommendationText');
        const loader = document.getElementById('loader');
        const historyList = document.getElementById('historyList');

        async function loadHistory() {
            try {
                const response = await fetch('/history');
                const data = await response.json();
                
                if (data.length > 0) {
                    historyList.innerHTML = data.map(item => `
                        <div class="history-item">
                            <strong>${item.zanr}:</strong> ${item.odpoved}
                        </div>
                    `).join('');
                }
            } catch (err) {
                console.error('Chyba při načítání historie');
            }
        }

        loadHistory();

        form.onsubmit = async (e) => {
            e.preventDefault();
            const genre = document.getElementById('genre').value;
            
            loader.style.display = 'block';
            resultDiv.style.display = 'none';

            try {
                const response = await fetch('/ai', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ genre: genre })
                });
                const data = await response.json();
                
                resultText.innerText = data.doporuceni || data.error;
                resultDiv.style.backgroundColor = data.error ? '#ff000010' : '#00ff0010';
                resultDiv.style.display = 'block';

                if (!data.error) loadHistory();
                
            } catch (err) {
                alert('Chyba při komunikaci se serverem.');
            } finally {
                loader.style.display = 'none';
            }
        };
    </script>
</body>
</html>
