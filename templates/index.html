<!DOCTYPE html> <!-- Definuje typ dokumentu jako HTML5 -->
<html lang="cs"> <!-- Začátek HTML dokumentu v češtině -->
<head> <!-- Sekce pro nastavení a metadata stránky -->
    <meta charset="UTF-8"> <!-- Nastavení kódování pro správné zobrazení češtiny -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Zajišťuje responzivitu pro mobily -->
    <title>AI Filmový Rádce</title> <!-- Titulek stránky v záložce prohlížeče -->
    <link rel="stylesheet" href="https://jsdelivr.net"> <!-- Připojení CSS stylu Pico pro hezký vzhled -->
    <style> <!-- Vlastní úpravy vzhledu -->
        body { padding: 2rem; } /* Odsazení obsahu od krajů */
        #result { margin-top: 2rem; padding: 1rem; border-radius: 8px; display: none; } /* Styl boxu s výsledkem, zatím skrytý */
        .loading { display: none; } /* Skrytí indikátoru načítání ve výchozím stavu */
        .history-section { margin-top: 3rem; border-top: 1px solid #444; padding-top: 1rem; } /* Styl sekce historie s čarou */
        .history-item { font-size: 0.9rem; margin-bottom: 0.5rem; border-bottom: 1px dashed #333; padding-bottom: 0.5rem; } /* Styl položky v historii */
    </style>
</head>
<body> <!-- Viditelný obsah stránky -->
    <main class="container"> <!-- Hlavní obal obsahu s vystředěním -->
        <header> <!-- Hlavička webu -->
            <h1>🎬 AI Filmový Rádce</h1> <!-- Hlavní nadpis -->
            <p>Zadej žánr a nechej si poradit od lokální AI (Gemma3:27b).</p> <!-- Instrukce pro uživatele -->
        </header>

        <section> <!-- Sekce s formulářem -->
            <form id="movieForm"> <!-- Formulář pro odeslání žánru -->
                <label for="genre">Žánr filmu</label> <!-- Popisek vstupního pole -->
                <input type="text" id="genre" name="genre" placeholder="např. Sci-fi, Komedie, Horor..." required> <!-- Pole pro zadání žánru -->
                <button type="submit" id="submitBtn">Najdi mi film</button> <!-- Tlačítko pro odeslání -->
            </form>
        </section>

        <progress class="loading" id="loader"></progress> <!-- Grafický indikátor průběhu (načítání) -->

        <article id="result"> <!-- Box, kde se zobrazí výsledek od AI -->
            <header><strong>Návrh pro tebe:</strong></header> <!-- Nadpis výsledku -->
            <p id="recommendationText"></p> <!-- Místo, kam se vloží text doporučení -->
        </article>

        <section class="history-section"> <!-- Sekce zobrazující historii dotazů -->
            <h3>📜 Historie doporučení</h3> <!-- Nadpis historie -->
            <div id="historyList"> <!-- Kontejner, do kterého se vypíše historie -->
                <p>Zatím žádná historie...</p> <!-- Výchozí text historie -->
            </div>
        </section>

        <footer style="margin-top: 3rem; font-size: 0.8rem;"> <!-- Patička stránky -->
            <p>Endpointy: <a href="/status">/status</a> | <a href="/history">/history</a></p> <!-- Odkazy na serverové funkce -->
        </footer>
    </main>

    <script> <!-- Začátek programové logiky (JavaScript) -->
        const form = document.getElementById('movieForm'); // Propojení formuláře do proměnné
        const resultDiv = document.getElementById('result'); // Propojení boxu výsledku do proměnné
        const resultText = document.getElementById('recommendationText'); // Propojení místa pro text do proměnné
        const loader = document.getElementById('loader'); // Propojení indikátoru načítání do proměnné
        const historyList = document.getElementById('historyList'); // Propojení seznamu historie do proměnné

        // Funkce pro načtení historie ze serveru
        async function loadHistory() {
            try {
                const response = await fetch('/history'); // Požadavek na server pro získání historie
                const data = await response.json(); // Převod odpovědi na formát JSON
                
                if (data.length > 0) { // Pokud historie není prázdná
                    historyList.innerHTML = data.map(item => ` // Vygenerování HTML pro každou položku
                        <div class="history-item">
                            <strong>${item.zanr}:</strong> ${item.odpoved}
                        </div>
                    `).join(''); // Spojení položek do jednoho řetězce a vložení do stránky
                }
            } catch (err) {
                console.error('Chyba při načítání historie'); // Výpis chyby do konzole při selhání
            }
        }

        // Načíst historii hned po otevření stránky
        loadHistory(); // Spuštění funkce načítání historie

        // Funkce po odeslání formuláře
        form.onsubmit = async (e) => {
            e.preventDefault(); // Zamezení obnovení stránky po odeslání
            const genre = document.getElementById('genre').value; // Získání textu zadaného žánru
            
            loader.style.display = 'block'; // Zobrazení indikátoru načítání
            resultDiv.style.display = 'none'; // Skrytí předchozího výsledku

            try {
                const response = await fetch('/ai', { // Odeslání dat na serverový endpoint /ai
                    method: 'POST', // Metoda odesílání POST
                    headers: { 'Content-Type': 'application/json' }, // Definice formátu dat jako JSON
                    body: JSON.stringify({ genre: genre }) // Převod žánru na JSON text
                });
                const data = await response.json(); // Čekání na odpověď a převod na JSON
                
                resultText.innerText = data.doporuceni || data.error; // Zobrazení doporučení nebo chybové zprávy
                resultDiv.style.backgroundColor = data.error ? '#ff000010' : '#00ff0010'; // Barva pozadí podle úspěchu/chyby
                resultDiv.style.display = 'block'; // Zobrazení boxu s výsledkem

                // Po úspěšném dotazu aktualizuj historii
                if (!data.error) loadHistory(); // Pokud nenastala chyba, znovu načti historii
                
            } catch (err) {
                alert('Chyba při komunikaci se serverem.'); // Upozornění při selhání sítě
            } finally {
                loader.style.display = 'none'; // Skrytí indikátoru načítání po dokončení dotazu
            }
        };
    </script>
</body>
</html>
